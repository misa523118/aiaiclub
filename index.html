<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>準備中｜愛アイクラブ 里親募集サイト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #2a5a72;
      --primary-light: #D4E1E8;
      --primary-dark:  #1a3a4a;
      --accent:        #e8f0f4;
      --text-muted:    #5a7a8a;
      --white:         #ffffff;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(26,58,74,0.12);
    }

    .paw {
      font-size: 56px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e0eaee;
      margin: 32px 0;
    }

    .cat-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 28px;
      margin-bottom: 32px;
    }

    .cat-row span {
      animation: wave 1.8s ease-in-out infinite;
    }
    .cat-row span:nth-child(2) { animation-delay: 0.3s; }
    .cat-row span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    .info-box {
      background: var(--accent);
      border-radius: 12px;
      padding: 18px 20px;
      font-size: 13px;
      color: var(--primary-dark);
      line-height: 1.7;
      text-align: left;
      border: 1px solid rgba(42,90,114,0.15);
    }

    .info-box strong {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 6px;
    }

    /* 管理者用のログインリンク（目立たせない） */
    .admin-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 11px;
      color: #b0c8d4;
      text-decoration: none;
      transition: color 0.2s;
    }
    .admin-link:hover { color: var(--primary); }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="paw">🐾</div>
  <div class="logo">愛アイクラブ 里親募集</div>

  <h1>ただいま準備中です</h1>
  <p class="subtitle">
    保護猫たちと素敵な出会いができるよう、<br>
    サイトを鋭意準備しています。<br>
    もうしばらくお待ちください。
  </p>

  <div class="cat-row">
    <span>🐱</span>
    <span>🐱</span>
    <span>🐱</span>
  </div>

  <hr class="divider">

  <div class="info-box">
    <strong>お知らせ</strong>
    愛アイクラブは三重県を拠点に活動する保護猫団体です。
    サイト公開後は、保護猫の里親募集情報や譲渡会の情報をお届けします。
    公開をお楽しみに！
  </div>

  <!-- 管理者向けリンク（目立たないよう薄く） -->
  <a href="login.html" class="admin-link">管理者ログイン</a>

</div>

</body>
</html>
