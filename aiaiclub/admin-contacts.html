<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ管理｜愛アイクラブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-bar { background: var(--accent); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .admin-bar-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 4px; }
    .admin-tab { font-size: 13px; font-weight: 600; padding: 12px 18px; color: var(--text-muted); border-bottom: 3px solid transparent; cursor: pointer; transition: all var(--transition); }
    .admin-tab:hover { color: var(--primary); }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* お問い合わせ一覧 */
    .contact-list { display: flex; flex-direction: column; gap: 12px; }
    .contact-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .contact-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .contact-card.status-done { border-left: 4px solid #2a6a2a; }
    .contact-card.status-pending { border-left: 4px solid #c8a030; }
    .contact-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .contact-card-name { font-size: 15px; font-weight: 700; color: var(--primary-dark); }
    .contact-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .contact-card-preview { font-size: 13px; color: var(--text-muted); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .contact-status-badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .badge-pending { background: #fff0cc; color: #7a5500; }
    .badge-inprogress { background: var(--primary-light); color: var(--primary-dark); }
    .badge-done { background: #d4edd4; color: #1a5a1a; }

    /* 詳細モーダル風パネル */
    .detail-panel { display: none; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px; }
    .detail-panel.open { display: block; }
    .detail-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-panel-title { font-size: 18px; font-weight: 800; color: var(--primary-dark); }
    .close-btn { background: var(--gray-100); border: none; border-radius: var(--radius-sm); padding: 6px 14px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .close-btn:hover { background: var(--gray-200); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .detail-item label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
    .detail-item p { font-size: 14px; color: var(--text); }
    .detail-message { background: var(--gray-50); border-radius: var(--radius-md); padding: 16px; font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 20px; border: 1px solid var(--border); white-space: pre-wrap; }
    .status-select-row { display: flex; align-items: center; gap: 12px; }
    .status-select-row label { font-size: 13px; font-weight: 600; color: var(--text); }
    .status-select-row select { font-size: 13px; padding: 8px 12px; border: 1.5px solid var(--border-md); border-radius: var(--radius-sm); background: var(--white); color: var(--text); font-family: var(--font-sans); }

    /* スケルトン */
    .skeleton { background: var(--gray-200); border-radius: var(--radius-md); animation: skeleton-pulse 1.4s ease-in-out infinite; }
    @keyframes skeleton-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* 空状態 */
    .empty-state { text-align: center; padding: 72px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }

    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">愛アイ<span>クラブ</span> 里親募集</a>
    <ul class="nav-links">
      <li><a href="cats.html">猫を探す</a></li>
      <li><a href="column.html">コラム</a></li>
      <li><a href="contact.html">お問い合わせ</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="userLabel" style="font-size:13px;color:var(--text-muted);">読み込み中...</span>
      <button class="nav-login-btn" onclick="handleLogout()">ログアウト</button>
    </div>
  </div>
</nav>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="index.html">管理トップ</a><span class="sep">›</span>お問い合わせ管理
  </div>
</div>

<div class="admin-bar">
  <div class="admin-bar-inner">
    <div class="admin-tab" onclick="location.href='cats.html'">登録猫一覧</div>
    <div class="admin-tab" onclick="location.href='register.html'">新規登録</div>
    <div class="admin-tab" onclick="location.href='admin-contacts.html'">お問い合わせ</div>
    <div class="admin-tab active">お問い合わせ管理</div>
  </div>
</div>

<section class="section">
  <div class="container">
    <div style="margin-bottom:24px;">
      <span class="section-label">団体管理</span>
      <h1 class="section-title">お問い合わせ一覧</h1>
      <p style="font-size:14px;color:var(--text-muted);">
        クリックすると詳細と対応状況の変更ができます。
      </p>
    </div>

    <!-- 詳細パネル -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-panel-header">
        <div class="detail-panel-title" id="panelName">-</div>
        <button class="close-btn" onclick="closePanel()">閉じる ✕</button>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><label>種別</label><p id="panelType">-</p></div>
        <div class="detail-item"><label>受付日時</label><p id="panelDate">-</p></div>
        <div class="detail-item"><label>メールアドレス</label><p id="panelEmail">-</p></div>
        <div class="detail-item"><label>電話番号</label><p id="panelTel">-</p></div>
        <div class="detail-item"><label>居住地</label><p id="panelPref">-</p></div>
        <div class="detail-item"><label>住居タイプ</label><p id="panelHouse">-</p></div>
        <div class="detail-item"><label>気になっている猫</label><p id="panelCatName">-</p></div>
        <div class="detail-item"><label>ふりがな</label><p id="panelKana">-</p></div>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">お問い合わせ内容</div>
      <div class="detail-message" id="panelMessage">-</div>
      <div class="status-select-row">
        <label>対応状況：</label>
        <select id="panelStatusSelect" onchange="updateStatus()">
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="対応済み">対応済み</option>
        </select>
        <span id="statusSaved" style="font-size:13px;color:#1a5a1a;display:none;">✓ 保存しました</span>
      </div>
    </div>

    <!-- スケルトン -->
    <div id="skeletonList" style="display:flex;flex-direction:column;gap:12px;">
      <div style="height:90px;border-radius:var(--radius-lg);" class="skeleton"></div>
      <div style="height:90px;border-radius:var(--radius-lg);" class="skeleton"></div>
      <div style="height:90px;border-radius:var(--radius-lg);" class="skeleton"></div>
    </div>

    <!-- お問い合わせ一覧 -->
    <div class="contact-list" id="contactList" style="display:none;"></div>

    <!-- 空状態 -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon">📭</div>
      <div class="empty-title">お問い合わせはまだありません</div>
    </div>

  </div>
</section>

<script>
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }

  let currentDocId = null;
  let allContacts  = [];

  // 日時フォーマット
  function formatDate(ts) {
    if (!ts) return '-';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ja-JP', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
    });
  }

  // ステータスのCSSクラス
  function statusClass(status) {
    if (status === '対応済み') return 'badge-done';
    if (status === '対応中')   return 'badge-inprogress';
    return 'badge-pending';
  }

  // カード枠のCSSクラス
  function cardClass(status) {
    if (status === '対応済み') return 'contact-card status-done';
    return 'contact-card status-pending';
  }

  // 詳細パネルを開く
  function openDetail(id) {
    const c = allContacts.find(c => c.id === id);
    if (!c) return;
    currentDocId = id;

    document.getElementById('panelName').textContent    = c.name + '　様';
    document.getElementById('panelKana').textContent    = c.kana    || '-';
    document.getElementById('panelType').textContent    = c.typeLabel || c.type || '-';
    document.getElementById('panelDate').textContent    = formatDate(c.createdAt);
    document.getElementById('panelEmail').textContent   = c.email   || '-';
    document.getElementById('panelTel').textContent     = c.tel     || '-';
    document.getElementById('panelPref').textContent    = c.pref    || '-';
    document.getElementById('panelHouse').textContent   = c.house   || '-';
    document.getElementById('panelCatName').textContent = c.catName || '-';
    document.getElementById('panelMessage').textContent = c.message || '-';
    document.getElementById('panelStatusSelect').value  = c.status  || '未対応';
    document.getElementById('statusSaved').style.display = 'none';

    document.getElementById('detailPanel').classList.add('open');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closePanel() {
    document.getElementById('detailPanel').classList.remove('open');
    currentDocId = null;
  }
</script>

<!-- Firebase処理 -->
<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, doc, updateDoc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── ログイン状態チェック ──
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      location.href = 'login.html';
    } else {
      document.getElementById('userLabel').textContent = user.email;
      loadContacts();
    }
  });

  // ── ログアウト ──
  window.handleLogout = async function () {
    await signOut(auth);
    location.href = 'login.html';
  };

  // ── お問い合わせ一覧を読み込む ──
  async function loadContacts() {
    const skeleton = document.getElementById('skeletonList');
    const listEl   = document.getElementById('contactList');
    const emptyEl  = document.getElementById('emptyState');

    try {
      const q        = query(collection(db, 'contacts'), orderBy('createdAt', 'desc'));
      const snapshot = await getDocs(q);

      allContacts = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data(),
      }));

      skeleton.style.display = 'none';

      if (allContacts.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      listEl.style.display = 'flex';
      listEl.innerHTML = allContacts.map(c => `
        <div class="${cardClass(c.status)}" onclick="openDetail('${c.id}')">
          <div class="contact-card-header">
            <div>
              <div class="contact-card-name">${c.name}　様</div>
              <div class="contact-card-meta">
                ${c.typeLabel || c.type || ''}　／　${formatDate(c.createdAt)}
              </div>
            </div>
            <span class="contact-status-badge ${statusClass(c.status)}">
              ${c.status || '未対応'}
            </span>
          </div>
          <div class="contact-card-preview">${c.message || ''}</div>
        </div>`
      ).join('');

    } catch (e) {
      skeleton.style.display = 'none';
      emptyEl.style.display  = 'block';
      emptyEl.innerHTML = `
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">読み込みに失敗しました</div>
        <p style="font-size:14px;color:var(--text-muted);">ページを再読み込みしてください。</p>`;
      console.error('Firestore読み込みエラー:', e);
    }
  }

  // ── 対応状況を更新 ──
  window.updateStatus = async function () {
    if (!currentDocId) return;
    const newStatus = document.getElementById('panelStatusSelect').value;
    const savedEl   = document.getElementById('statusSaved');

    try {
      await updateDoc(doc(db, 'contacts', currentDocId), { status: newStatus });

      // メモリ上のデータも更新
      const target = allContacts.find(c => c.id === currentDocId);
      if (target) target.status = newStatus;

      // 一覧のバッジも更新
      const listEl = document.getElementById('contactList');
      listEl.innerHTML = allContacts.map(c => `
        <div class="${cardClass(c.status)}" onclick="openDetail('${c.id}')">
          <div class="contact-card-header">
            <div>
              <div class="contact-card-name">${c.name}　様</div>
              <div class="contact-card-meta">
                ${c.typeLabel || c.type || ''}　／　${formatDate(c.createdAt)}
              </div>
            </div>
            <span class="contact-status-badge ${statusClass(c.status)}">
              ${c.status || '未対応'}
            </span>
          </div>
          <div class="contact-card-preview">${c.message || ''}</div>
        </div>`
      ).join('');

      savedEl.style.display = 'inline';
      setTimeout(() => { savedEl.style.display = 'none'; }, 2000);

    } catch (e) {
      alert('更新に失敗しました。もう一度お試しください。');
      console.error('Firestore更新エラー:', e);
    }
  };
</script>

</body>
</html>
